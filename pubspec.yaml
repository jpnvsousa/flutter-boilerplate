name: flutter_boilerplate
description: Flutter MVP Boilerplate — Supabase + RevenueCat + Riverpod
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Backend ---
  supabase_flutter: 2.5.6       # PostgreSQL + Auth + Storage
  dio: 5.4.3                    # HTTP client

  # --- State Management ---
  flutter_riverpod: 2.5.1       # State management
  riverpod_annotation: 2.3.5    # Code generation for Riverpod

  # --- Navigation ---
  go_router: 14.2.0             # Declarative routing

  # --- Models ---
  freezed_annotation: 2.4.1     # Immutable models
  json_annotation: 4.9.0        # JSON serialization

  # --- Dependency Injection ---
  get_it: 7.7.0                 # Service locator
  injectable: 2.4.1             # DI code generation

  # --- Payments ---
  purchases_flutter: 7.4.0      # RevenueCat IAP

  # --- Push Notifications ---
  firebase_core: 3.3.0
  firebase_messaging: 15.1.0

  # --- Local Cache ---
  drift: 2.18.0                 # SQLite type-safe ORM
  sqlite3_flutter_libs: 0.5.24  # SQLite bindings
  path_provider: 2.1.3          # File system paths
  path: 1.9.0

  # --- Error Monitoring ---
  sentry_flutter: 8.3.0

  # --- Auth Social ---
  google_sign_in: 6.2.1
  sign_in_with_apple: 6.1.2

  # --- UI ---
  flutter_svg: 2.0.10+1         # SVG support
  cached_network_image: 3.3.1   # Image caching
  shimmer: 3.0.0                # Loading skeleton

  # --- Utils ---
  shared_preferences: 2.3.1     # Local key-value storage
  intl: 0.19.0                  # Internationalization
  url_launcher: 6.3.0           # Open URLs

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Code Generation ---
  build_runner: 2.4.11
  freezed: 2.5.2
  json_serializable: 6.8.0
  riverpod_generator: 2.4.0
  injectable_generator: 2.4.2
  drift_dev: 2.18.0

  # --- Testing ---
  mocktail: 1.0.4
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
